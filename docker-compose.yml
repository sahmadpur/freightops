services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: freightops
      POSTGRES_PASSWORD: freightops_dev
      POSTGRES_DB: freightops
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freightops"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: freightops
      MINIO_ROOT_PASSWORD: freightops_dev
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    environment:
      MP_MAX_MESSAGES: "500"

  # Development app (web + API): source bind-mounted with hot reload.
  # node_modules and .next live in named volumes so the container's Linux
  # binaries and build artifacts never clash with the macOS host copies.
  # Starts with `docker compose up -d`. Uses port 3000 — don't run the
  # production `app` service (or a host `npm run dev`) at the same time.
  app-dev:
    image: node:24-alpine
    working_dir: /app
    command: sh -c "npm install && npm run db:migrate && npm run dev"
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://freightops:freightops_dev@postgres:5432/freightops
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: http://localhost:3000
      APP_BASE_URL: http://localhost:3000
      NEXT_DIST_DIR: .next-docker
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: freightops
      S3_SECRET_KEY: freightops_dev
      S3_BUCKET: freightops-documents
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_FROM: "FreightOps <no-reply@freightops.local>"
    volumes:
      - .:/app
      - app_dev_node_modules:/app/node_modules
      - app_dev_next:/app/.next-docker
    depends_on:
      postgres:
        condition: service_healthy

  # Production app (built image, migrations on start): `docker compose --profile full up -d --build`
  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://freightops:freightops_dev@postgres:5432/freightops
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${APP_BASE_URL}
      APP_BASE_URL: ${APP_BASE_URL}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: freightops
      S3_SECRET_KEY: freightops_dev
      S3_BUCKET: freightops-documents
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_FROM: "FreightOps <no-reply@freightops.local>"
    # minio is not a runtime dependency until Phase 4 (document uploads)
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["full"]

volumes:
  pgdata:
  miniodata:
  app_dev_node_modules:
  app_dev_next:
