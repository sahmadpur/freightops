services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: freightops
      POSTGRES_PASSWORD: freightops_dev
      POSTGRES_DB: freightops
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freightops"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: freightops
      MINIO_ROOT_PASSWORD: freightops_dev
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://freightops:freightops_dev@postgres:5432/freightops
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${APP_BASE_URL}
      APP_BASE_URL: ${APP_BASE_URL}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: freightops
      S3_SECRET_KEY: freightops_dev
      S3_BUCKET: freightops-documents
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["full"]

volumes:
  pgdata:
  miniodata:
